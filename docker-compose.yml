version: "3.9"

services:
  mainnetwork:
    image: alpine:latest
    command: ["tail", "-f", "/dev/null"]

  nginx:
    image: nginx:alpine
    network_mode: service:mainnetwork
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

  db:
    image: postgis/postgis:15-3.3-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./db/docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - APP_ENV=${APP_ENV}
      - DATABASE_URL=${DATABASE_URL}
    command: ./start.sh
    depends_on:
      - db
    network_mode: service:mainnetwork

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - APP_ENV=${APP_ENV}
      - DATABASE_URL=${DATABASE_URL}
    command: ./start.sh python -m app.scheduler
    depends_on:
      - db
    network_mode: service:mainnetwork

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=${NODE_ENV}
    command: ./start.sh
    stdin_open: true
    tty: true
    depends_on:
      - backend
    network_mode: service:mainnetwork

volumes:
  pg-data:
